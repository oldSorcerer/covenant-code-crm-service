name: 🐶 PR Watchdog

# Сторожевой пёсик: лает в каждый новый (или повторно открытый) Pull Request.
# Оставляет ровно один случайный комментарий. Изредка выпадает секретная фраза.

on:
  pull_request_target:
    types:
      - opened
      - reopened

# GITHUB_TOKEN должен иметь право писать комментарии в Pull Request
permissions:
  pull-requests: write
  contents: read

jobs:
  bark:
    name: Гав!
    runs-on: ubuntu-latest
    steps:
      - name: Оставить случайный комментарий
        env:
          GH_TOKEN: ${{ secrets.WATCHDOG_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          # ──────────────────────────────────────────────
          # Обычные фразы пёсика — добавляй свои смело.
          # ──────────────────────────────────────────────
          messages=(
            "🐶 Гав! Новый Pull Request обнаружен."
            "🐶 Никто не пройдёт незамеченным."
            "👀 Я всё видел."
            "🚨 В репозиторий поступил новый код."
            "🦴 Pull Request зарегистрирован."
            "🐕 Пост №1. Объект принят на проверку."
            "🐶 Новый запах коммитов. Проверяем."
            "🐾 Свежие следы в репозитории. Иду по запаху."
            "🐶 Кто-то принёс палку... то есть код. Несу на ревью."
            "🦴 Команда «апорт» выполнена: PR доставлен."
            "🐕‍🦺 На страже. Этот PR под наблюдением."
            "🐶 Хороший человек принёс хороший Pull Request. Наверное."
            "🚨 Тревога!.. А, нет, это просто новый PR. Гавкнул на всякий случай."
            "🐾 Зафиксировано движение в ветке."
            "🐶 Виляю хвостом: появился свежий Pull Request."
            "👁️ Большой брат-пёсик следит за тобой."
            "🦴 Закопал предыдущий PR, выкопал новый."
            "🐕 Облаял. Теперь официально: PR открыт."
            "🐶 Чую коммиты за версту."
            "🚨 Периметр нарушен. Зафиксирован новый Pull Request."
            "🐾 Принюхался. Пахнет рефакторингом."
            "🐶 Сижу. Лежу. Ревьюю. Новый PR на месте."
            "🦴 За этот PR полагается косточка. Потом."
            "🐕 Доложил по форме: Pull Request открыт."
            "🐶 Ещё один смельчак рискнул открыть PR. Уважаю."
            "🐶 Принял, понюхал, одобряю появление."
          )

          # ──────────────────────────────────────────────
          # СЕКРЕТНЫЕ фразы — выпадают редко (см. SECRET_CHANCE).
          # Самые своеобразные. Лови момент.
          # ──────────────────────────────────────────────
          secret_messages=(
            "🐶 Я не пёс. Я никогда не был псом. Гав."
            "🌑 Пёсик видел этот коммит ещё до того, как ты его написал."
            "🛸 Контакт установлен. Pull Request — это сигнал. Мы отвечаем."
            "🐶 Псы не умеют читать код. Но я умею. И это пугает даже меня."
            "👁️🐕 Седьмой страж пробудился. PR замечен."
            "🦴 В прошлой жизни я был сеньор-разработчиком."
            "🌀 Этот Pull Request уже существовал. И будет существовать снова."
            "🐕 Тс-с. Не все коммиты должны быть найдены. Но этот — да."
            "🕯️ Пёсик зажёг свечу за этот merge. На всякий случай."
            "🐾 01000111 01100001 01110110 — это «Гав» по-машинному."
            "🐶 Хороший мальчик становится хорошим ревьюером. Цикл замыкается."
          )

          # Шанс секретной фразы, в процентах (0–100)
          SECRET_CHANCE=8

          roll=$(( RANDOM % 100 ))
          if [ "$roll" -lt "$SECRET_CHANCE" ]; then
            pool=("${secret_messages[@]}")
            echo "🎉 Выпала СЕКРЕТНАЯ фраза (roll=$roll < $SECRET_CHANCE)"
          else
            pool=("${messages[@]}")
            echo "Обычная фраза (roll=$roll)"
          fi

          # Выбираем случайную фразу из выбранного пула
          index=$(( RANDOM % ${#pool[@]} ))
          message="${pool[$index]}"

          echo "Пёсик говорит: $message"

          # Публикуем ОДИН комментарий в PR через встроенный gh + GITHUB_TOKEN
          gh pr comment "$PR_NUMBER" --repo "$REPO" --body "$message"
